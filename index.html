<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Life Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header class="header">

            <div class="header-content">

                <h1 id="clock">
                    00:00:00
                </h1>

                <p id="date">
                    Monday, January 1, 2026
                </p>

                <h2 id="greeting">
                    Good Morning
                </h2>

            </div>

            <button id="themeBtn" title="Toggle Theme">
                🌙
            </button>

        </header>

        <main class="dashboard">

            <div class="left-panel">


                <section class="card">

                    <h3>
                        Focus Timer
                    </h3>

                    <div class="timer-display" id="timer">
                        25:00
                    </div>

                    <div class="timer-setting">

                        <label for="timerMinutes">
                            Minutes
                        </label>

                        <input
                            type="number"
                            id="timerMinutes"
                            value="25"
                            min="1"
                            max="120">

                    </div>

                    <div class="button-group">

                        <button id="startBtn">
                            Start
                        </button>

                        <button id="stopBtn">
                            Stop
                        </button>

                        <button id="resetBtn">
                            Reset
                        </button>

                    </div>

                </section>


                <section class="card">

                    <h3>
                        Quick Links
                    </h3>

                    <div class="link-form">

                        <input
                            type="text"
                            id="linkName"
                            placeholder="Link name">

                        <input
                            type="url"
                            id="linkURL"
                            placeholder="https://example.com">

                        <button id="addLinkBtn">
                            Add Link
                        </button>

                    </div>

                    <div
                        class="links-container"
                        id="linksContainer">


                    </div>

                </section>

            </div>


            <div class="right-panel">

                <section class="card">

                    <div class="task-header">

                        <h3>
                            Tasks
                        </h3>

                        <span id="taskCounter">
                            0 Task
                        </span>

                    </div>

                    <div class="task-input">

                        <input
                            type="text"
                            id="taskInput"
                            placeholder="Add a new task...">

                        <button id="addTaskBtn">
                            Add
                        </button>

                    </div>

                    <ul
                        id="taskList"
                        class="task-list">


                    </ul>

                </section>

            </div>

        </main>

    </div>


    <template id="taskTemplate">

        <li class="task-item">

            <div class="task-left">

                <input
                    type="checkbox"
                    class="task-check">

                <span
                    class="task-text"
                    contenteditable="false">
                    Sample Task
                </span>

            </div>

            <div class="task-actions">

                <button class="edit-btn">
                    ✏️
                </button>

                <button class="delete-btn">
                    🗑
                </button>

            </div>

        </li>

    </template>


    <template id="linkTemplate">

        <div class="link-card">

            <a
                class="link-button"
                href="#"
                target="_blank">

                Google

            </a>

            <button class="remove-link">

                ×

            </button>

        </div>

    </template>

    <script src="script.js"></script>

</body>

</html>
